<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hidden Football Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="score-board">
            <span id="score">0</span>
            <div class="high-score">أعلى نتيجة: <span id="highScore">0</span></div>
        </div>

        <div class="ball" id="ball">⚽️</div>

        <div class="game-over" id="gameOver">
            <h2>خسرت! 😞</h2>
            <p>النتيجة: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">إعادة اللعب 🔄</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
