<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hidden Telegram Football Game</title>
    <!-- مكتبة تليجرام الرسمية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: #fff;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #header {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }
        #ball {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            touch-action: none;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 20;
            max-height: 80vh;
            overflow-y: auto;
        }
        #gameOver h2 {
            margin-top: 0;
            color: #ff4757;
        }
        .btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            margin: 8px;
            cursor: pointer;
            width: 80%;
        }
        .btn-share {
            background: #1e90ff;
        }
        #leaderboard {
            margin-top: 15px;
            text-align: right;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        #leaderboard h3 {
            margin: 5px 0 10px 0;
            text-align: center;
            color: #ffa502;
            font-size: 16px;
        }
        #leaderboardList {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 14px;
        }
        #leaderboardList li {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="header">
        <div>اللاعب: <span id="username">...</span></div>
        <div>النقاط: <span id="score">0</span> | الأعلى: <span id="highScore">0</span></div>
    </div>

    <div id="ball">⚽️</div>

    <div id="gameOver">
        <h2>انتهت اللعبة! ⚽️</h2>
        <p>نقاطك في هذه الجولة: <b id="finalScore">0</b></p>
        
        <button class="btn" onclick="resetGame()">إعادة اللعب 🔄</button>
        <button class="btn btn-share" onclick="shareScore()">مشاركة النتيجة 🚀</button>

        <div id="leaderboard">
            <h3>🏆 قائمة أفضل 10 لاعبين</h3>
            <ol id="leaderboardList">
                <li>جاري التحميل... ⏳</li>
            </ol>
        </div>
    </div>
</div>

<script src="game.js?v=2"></script>
</body>
</html>
