<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hidden Telegram Football Game</title>
    <!-- مكتبة تليجرام الرسمية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: #fff;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #header {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            width: 90%;
            font-size: 16px;
            font-weight: bold;
        }
        #ball {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            touch-action: none;
        }
        .btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn-leaderboard {
            background: #ffa502;
            color: #000;
        }
        .btn-share {
            background: #1e90ff;
            width: 80%;
            margin-top: 10px;
        }
        /* الشاشات المنبثقة */
        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            z-index: 20;
        }
        .modal h2 {
            margin-top: 0;
            color: #ff4757;
        }
        #leaderboardModal h2 {
            color: #ffa502;
        }
        #leaderboardList {
            list-style: none;
            padding: 0;
            margin: 15px 0;
            font-size: 15px;
            text-align: right;
            max-height: 250px;
            overflow-y: auto;
        }
        #leaderboardList li {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="header">
        <div class="stats-bar">
            <div>اللاعب: <span id="username">...</span></div>
            <div>النقاط: <span id="score">0</span> | الأعلى: <span id="highScore">0</span></div>
        </div>
        <!-- زر أفضل 10 لاعبين -->
        <button class="btn btn-leaderboard" onclick="openLeaderboard()">🏆 أفضل 10 لاعبين</button>
    </div>

    <div id="ball">⚽️</div>

    <!-- شاشة الخسارة -->
    <div id="gameOver" class="modal">
        <h2>انتهت اللعبة! ⚽️</h2>
        <p>نقاطك في هذه الجولة: <b id="finalScore">0</b></p>
        <button class="btn" onclick="resetGame()">إعادة اللعب 🔄</button>
        <button class="btn btn-share" onclick="shareScore()">مشاركة النتيجة 🚀</button>
    </div>

    <!-- شاشة قائمة المتصدرين (تظهر عند ضغط الزر) -->
    <div id="leaderboardModal" class="modal">
        <h2>🏆 أفضل 10 لاعبين</h2>
        <ul id="leaderboardList">
            <li>جاري التحميل... ⏳</li>
        </ul>
        <button class="btn" onclick="closeLeaderboard()">إغلاق ✖️</button>
    </div>
</div>

<script src="game.js?v=3"></script>
</body>
</html>
